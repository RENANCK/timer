<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fluxo de Coisas Aleatórias</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* Fundo com gradiente animado para dar energia */
            background: linear-gradient(-45deg, #1e1e2f, #2d2b42, #402c47, #1f3b4d);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #fff;
            padding: 20px;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            /* Efeito de Vidro (Glassmorphism) */
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 50px 30px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.2);
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: linear-gradient(90deg, #00f2fe, #4facfe, #00f2fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            font-size: 0.9rem;
            color: #b0b0c0;
            margin-bottom: 40px;
        }

        .result-box {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 16px;
            padding: 40px 20px;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin-bottom: 30px;
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.3s ease;
        }

        .icon {
            font-size: 4rem;
            margin-bottom: 15px;
            text-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        .action-text {
            font-size: 1.5rem;
            font-weight: 600;
            line-height: 1.4;
        }

        .sub-action-text {
            font-size: 1.2rem;
            color: #00f2fe;
            margin-top: 10px;
            font-weight: 600;
            background: rgba(0, 242, 254, 0.1);
            padding: 5px 15px;
            border-radius: 8px;
        }

        .btn {
            background: linear-gradient(45deg, #00f2fe, #4facfe);
            color: #fff;
            border: none;
            padding: 18px 40px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0, 242, 254, 0.3);
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            width: 100%;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(0, 242, 254, 0.4);
        }

        .btn:active {
            transform: translateY(1px);
        }

        .btn:disabled {
            background: #555;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        /* Animação de pulo do texto */
        .pop {
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Sair da Inércia</h1>
        <p class="subtitle">Aperte o botão e deixe o acaso decidir seu próximo passo.</p>

        <div class="result-box" id="resultBox">
            <div class="icon" id="iconDisplay">🎲</div>
            <div class="action-text" id="textDisplay">Pronto para começar?</div>
            <div class="sub-action-text" id="subTextDisplay" style="display: none;"></div>
        </div>

        <button class="btn" id="generateBtn" onclick="iniciarSorteio()">Gerar Ação</button>
    </div>

    <script>
        // Estrutura de dados com os pesos exatos que você definiu
        const atividades = [
            { nome: "Escutar 5 Músicas", peso: 7, icone: "🎧" },
            { nome: "Escutar 10 Músicas", peso: 2, icone: "🎵" },
            { nome: "Escutar 12 Músicas", peso: 1, icone: "🎶" },
            { 
                nome: "Fazer Exercício", peso: 5, icone: "💪",
                sub: [
                    { nome: "5 Flexões", peso: 20 },
                    { nome: "10 Flexões", peso: 5 },
                    { nome: "10 Abdominais", peso: 20 },
                    { nome: "5 Agachamentos", peso: 20 },
                    { nome: "10 Agachamentos", peso: 12 },
                    { nome: "15 Agachamentos", peso: 12 },
                    { nome: "20 Agachamentos", peso: 8 },
                    { nome: "15 Abdominais", peso: 8 }
                ]
            },
            { nome: "Fumar um cigarro lá fora", peso: 8, icone: "🚬" },
            { 
                nome: "Assistir uma Série", peso: 4, icone: "📺",
                sub: [
                    { nome: "The Office", peso: 20 },
                    { nome: "Modern Family", peso: 20 },
                    { nome: "Friends", peso: 20 },
                    { nome: "House MD", peso: 10 },
                    { nome: "The Pit", peso: 10 },
                    { nome: "Pluribus", peso: 5 },
                    { nome: "O Cavaleiro dos Sete Reinos", peso: 15 }
                ]
            },
            { nome: "Ler um Caso Médico", peso: 2, icone: "🩺" },
            { nome: "Ler 5 Páginas", peso: 2, icone: "📖" },
            { nome: "Ler 10 Páginas", peso: 1, icone: "📚" },
            { nome: "Ler 15 Páginas", peso: 0.5, icone: "📑" },
            { 
                nome: "Meditação", peso: 5, icone: "🧘‍♂️",
                sub: [
                    { nome: "5 Minutos", peso: 55 },
                    { nome: "7 Minutos", peso: 25 },
                    { nome: "10 Minutos", peso: 15 },
                    { nome: "15 Minutos", peso: 5 }
                ]
            },
            { 
                nome: "Ir lá fora", peso: 3, icone: "🚶‍♂️",
                sub: [
                    { nome: "5 Minutos", peso: 55 },
                    { nome: "10 Minutos", peso: 35 },
                    { nome: "20 Minutos", peso: 10 }
                ]
            }
        ];

        // Função mágica que escolhe baseada no peso
        function escolherComPeso(array) {
            let somaPesos = array.reduce((soma, item) => soma + item.peso, 0);
            let aleatorio = Math.random() * somaPesos;
            
            for (let i = 0; i < array.length; i++) {
                aleatorio -= array[i].peso;
                if (aleatorio <= 0) {
                    return array[i];
                }
            }
            return array[array.length - 1]; // Fallback de segurança
        }

        // Elementos do DOM
        const iconDisplay = document.getElementById('iconDisplay');
        const textDisplay = document.getElementById('textDisplay');
        const subTextDisplay = document.getElementById('subTextDisplay');
        const btn = document.getElementById('generateBtn');
        const resultBox = document.getElementById('resultBox');

        function iniciarSorteio() {
            btn.disabled = true;
            btn.innerText = "Sorteando...";
            subTextDisplay.style.display = "none";
            
            // Remove a classe de animação para poder reaplicar depois
            iconDisplay.classList.remove('pop');
            textDisplay.classList.remove('pop');

            let tempo = 0;
            let intervalo = setInterval(() => {
                // Efeito visual de roleta (escolhe aleatório ignorando pesos rápido)
                let tempItem = atividades[Math.floor(Math.random() * atividades.length)];
                iconDisplay.innerText = tempItem.icone;
                textDisplay.innerText = tempItem.nome;
                
                tempo += 100;
                
                // Após 1.5 segundos, para e mostra o resultado real
                if (tempo >= 1500) {
                    clearInterval(intervalo);
                    mostrarResultadoFinal();
                }
            }, 100);
        }

        function mostrarResultadoFinal() {
            // Escolhe a categoria principal baseado no peso
            const resultadoPrincipal = escolherComPeso(atividades);
            
            iconDisplay.innerText = resultadoPrincipal.icone;
            textDisplay.innerText = resultadoPrincipal.nome;
            
            // Re-aplica animação
            iconDisplay.classList.add('pop');
            textDisplay.classList.add('pop');

            // Verifica se tem sub-itens (como Séries ou Exercícios)
            if (resultadoPrincipal.sub) {
                const resultadoSub = escolherComPeso(resultadoPrincipal.sub);
                subTextDisplay.innerText = "👉 " + resultadoSub.nome;
                subTextDisplay.style.display = "block";
                subTextDisplay.classList.add('pop');
            }

            // Uma dica caso caia música
            if (resultadoPrincipal.nome.includes("Músicas")) {
                subTextDisplay.innerText = "👉 Boa hora pra um Trap ou Rock!";
                subTextDisplay.style.display = "block";
                subTextDisplay.classList.add('pop');
            }

            btn.disabled = false;
            btn.innerText = "Gerar Nova Ação";
        }
    </script>
</body>
</html>
